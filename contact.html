    <main>
        <section class="contact-section">
            <h2>CONTACT ME</h2>
            <div class="contact-container">
                
                <div class="contact-form">
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="name">Name *</label>
                            <input type="text" id="name" name="name" required placeholder="Enter your full name">
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email address">
                        </div>
                        
                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" name="message" rows="5" required placeholder="Write your message here..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h3>Connect With Me</h3>
                    
                    <div class="contact-item">
                        <span>📧</span>
                        <a href="mailto:chiwengarebecca@gmail.com"> chiwengarebecca@gmail.com</a>
                    </div>
                    
                    <div class="social-links">
                        <a href="https://gitHub.com/becca-zw" class="social-icon">GitHub</a>
                        <a href="https://linkedin.com/in/rebeccachiwenga" class="social-icon">LinkedIn</a>
                        <a href="https:twitter.com/beccy" class="social-icon">Twitter</a>
                    </div>
                    
                    <div class="availability">
                        <p>📞 Available for contract work and collaboration opportunities.</p>
                        <p>⏱️ Response time: Usually within 24 hours.</p>
                    </div>
                </div>
            </div>
        </section>
